
base_model: axolotl-ai-co/DeepSeek-V3-11M
trust_remote_code: true

datasets:
  - path: mlabonne/FineTome-100k
    type: chat_template
    field_messages: conversations
    message_property_mappings:
      role: from
      content: value
    drop_system_message: true
    split: train[:1%]

chat_template: deepseek_v3
special_tokens:
  bos_token: "<｜begin▁of▁sentence｜>"
  eos_token: "<｜end▁of▁sentence｜>"

sequence_len: 2048
sample_packing: true
pad_to_sequence_len: true
val_set_size: 0

adapter: lora
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target_linear: true

micro_batch_size: 1
gradient_accumulation_steps: 2
num_epochs: 1
max_steps: 5
optimizer: adamw_bnb_8bit
lr_scheduler: cosine
learning_rate: 0.00001
bf16: true

output_dir: ./outputs/fsa-test

attn_implementation: fsa
nsa_block_size: 64
nsa_topk: 16
nsa_kernel_size: 32
nsa_kernel_stride: 16
nsa_window_size: 512
nsa_init_blocks: 1
nsa_local_blocks: 2
