# Nemotron-3 Super NVFP4 checkpoint + ScatterMoE expert kernels.
# The routed experts stay packed NVFP4 (modelopt MIXED_PRECISION: experts NVFP4,
# shared path FP8 -> dequantized to bf16 at load); LoRA trains on the experts via
# the grouped fp4 path and on the shared projections as regular LoRA modules.
# See examples/nemotron-h/README.md for architecture notes and requirements.
base_model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4

plugins:
  - axolotl.integrations.kernels.KernelsPlugin
  - axolotl.integrations.cut_cross_entropy.CutCrossEntropyPlugin
  - axolotl.integrations.liger.LigerPlugin

liger_layer_norm: true
liger_rope: true
liger_rms_norm: true
liger_rms_norm_gated: true

use_kernels: true
use_scattermoe: true
dsv4_fp4_grouped_mode: nvfp4

# LoRA kernel patches are incompatible with this architecture — see README.
lora_mlp_kernel: false
lora_qkv_kernel: false
lora_o_kernel: false

chat_template: tokenizer_default
datasets:
  - path: mlabonne/FineTome-100k
    type: chat_template
    split: train[:20%]
    field_messages: conversations
    message_property_mappings:
      role: from
      content: value

val_set_size: 0.0
output_dir: ./outputs/out
dataset_prepared_path: last_run_prepared

sequence_len: 4096
sample_packing: true

adapter: lora
lora_r: 16
lora_alpha: 32
lora_dropout: 0.0
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - fc1_latent_proj
  - fc2_latent_proj
# routed experts are 3D nn.Parameter tensors (non-gated: up/down only, no gate_proj)
lora_target_parameters:
  - up_proj
  - down_proj

gradient_accumulation_steps: 2
micro_batch_size: 1
num_epochs: 1
optimizer: adamw_torch_fused
lr_scheduler: cosine
learning_rate: 1e-4

bf16: true
tf32: true

gradient_checkpointing: true
logging_steps: 1
flash_attention: true

warmup_ratio: 0.05
saves_per_epoch: 1
weight_decay: 0.0
special_tokens:
