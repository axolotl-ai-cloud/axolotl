# Tiny Qwen3-MoE (random init, 724M params) full fine-tune with Expert Parallel.
# Same shape as baseline_tiny_fullft.yaml — only difference is the EP plugin.
# Run on 2x A100 NVLink:
#   torchrun --nproc-per-node=2 -m axolotl.cli.train \
#     examples/expert_parallel/ep_tiny_fullft.yaml

base_model: /workspace/data/tiny-qwen3-moe

plugins:
  - axolotl.integrations.expert_parallel.ExpertParallelPlugin

datasets:
  - path: mhenrichsen/alpaca_2k_test
    type: alpaca

dataset_prepared_path: ./outputs/deepep_e2e/tiny_data_prepared
output_dir: ./outputs/deepep_e2e/ep-tiny-fullft

load_in_4bit: false
load_in_8bit: false

experts_implementation: grouped_mm

expert_parallel_size: 2  # world group at 2 ranks

sequence_len: 512
sample_packing: true

micro_batch_size: 4
gradient_accumulation_steps: 1
max_steps: 50

optimizer: adamw_torch
lr_scheduler: cosine
learning_rate: 0.0001
warmup_steps: 5

bf16: true
tf32: false

gradient_checkpointing: false
flash_attention: true
logging_steps: 1
save_strategy: "no"

seed: 42

wandb_project: deepep
wandb_name: tiny-qwen3moe-fullft-ep-deep_ep_grouped_mm-2gpu
