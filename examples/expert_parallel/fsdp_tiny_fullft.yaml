# Tiny Qwen3-MoE (random init, 724M params) full FT — FSDP2, no EP.
# Third comparison point alongside baseline_tiny_fullft.yaml (DDP, no EP)
# and ep_tiny_fullft.yaml (DDP, EP).
# Run on 2x A100 NVLink:
#   torchrun --nproc-per-node=2 -m axolotl.cli.train \
#     examples/expert_parallel/fsdp_tiny_fullft.yaml

base_model: /workspace/data/tiny-qwen3-moe

datasets:
  - path: mhenrichsen/alpaca_2k_test
    type: alpaca

dataset_prepared_path: ./outputs/deepep_e2e/tiny_data_prepared
output_dir: ./outputs/deepep_e2e/fsdp-tiny-fullft

load_in_4bit: false
load_in_8bit: false

experts_implementation: grouped_mm

sequence_len: 512
sample_packing: true

micro_batch_size: 4
gradient_accumulation_steps: 1
max_steps: 50

optimizer: adamw_torch
lr_scheduler: cosine
learning_rate: 0.0001
warmup_steps: 5

bf16: true
tf32: false

gradient_checkpointing: false
flash_attention: true
logging_steps: 1
save_strategy: "no"

seed: 42

# FSDP2 sharding all params across the 2 ranks. No EP plugin.
fsdp_config:
  fsdp_version: 2
  offload_params: false
  cpu_ram_efficient_loading: false
  auto_wrap_policy: TRANSFORMER_BASED_WRAP
  transformer_layer_cls_to_wrap: Qwen3MoeDecoderLayer
  state_dict_type: FULL_STATE_DICT
  sharding_strategy: FULL_SHARD
  reshard_after_forward: true

wandb_project: deepep
wandb_name: tiny-qwen3moe-fullft-fsdp2-no-ep-2gpu
