# DeepSeek-V4-Flash MoE LoRA on an NVFP4 (modelopt) checkpoint.
# Validated on 2xB200 (sm100) with FSDP2: ~130 tok/s total, train_loss ~1.09 at seq 4096.
# Single-GPU also works (drop the fsdp_* block) but the ~168GB model needs >=180GB VRAM.
#
# The pieces that make this run:
#   1. use_dsv4_kernels: true
#        V4-Flash is eager-only (head_dim 512). The dsv4 kernels plugin swaps the eager
#        attention/rope/mHC/compressor/indexer for fused Triton kernels. Keep
#        attn_implementation: eager so the plugin owns the attention path.
#   2. dsv4_fp4_grouped_mode: nvfp4
#        Routes the NVFP4 experts through the fused 4-bit-read grouped GEMM. Base GEMM
#        auto-dispatches by arch: DeepGEMM (sm100 / Blackwell datacenter, e.g. B200 — the fp8xfp4
#        kernel is sm100-only) -> CUTLASS (sm120, e.g. RTX PRO 6000) -> chunked-dequant fallback.
#        Backward is chunked bf16-dequant + grouped_mm (bf16 grad required for accuracy).
#        Under FSDP the per-step nvfp4->mxfp4 requant is recomputed and freed per layer (not cached
#        across layers, which would hold a full-model mxfp4 copy per rank and OOM).
#   3. sample_packing: true
#        REQUIRED for steady throughput. Without it, variable sequence lengths re-trigger the
#        DeepGEMM/Triton/grouped autotune every step (recompile-bound, throughput collapses).
#
# Quick single-GPU bring-up / debug: set env DSV4_TRUNCATE_LAYERS=N to train only the first N
# decoder layers (the model slice still spans all attention types). Not for real training.
base_model: nvidia/DeepSeek-V4-Flash-NVFP4
attn_implementation: eager

plugins:
  - axolotl.integrations.cut_cross_entropy.CutCrossEntropyPlugin
  - axolotl.integrations.kernels.KernelsPlugin

use_kernels: true
use_scattermoe: true          # NVFP4 experts (LoRA-on-experts)
use_dsv4_kernels: true        # sliding/CSA attn + rope + mHC + gated-pool + indexer
lora_mlp_kernel: true         # fused clamped-SwiGLU LoRA on the dense shared MLP
dsv4_fp4_grouped_mode: nvfp4  # fused 4-bit grouped MoE GEMM (DeepGEMM sm90,100 / CUTLASS sm120)
# large vocab -> never materialize the full [tokens, vocab] logits (~8.5 GiB saved on a comparable run)
cut_cross_entropy: true
strict: false

datasets:
  - path: tatsu-lab/alpaca
    type: alpaca
val_set_size: 0.0
output_dir: ./outputs/dsv4-flash-nvfp4-lora
sequence_len: 4096
sample_packing: true

adapter: lora
lora_r: 16
lora_alpha: 32
lora_dropout: 0.0
# MoE expert LoRA (3D Parameter tensors, not nn.Linear)
lora_target_parameters:
  - mlp.experts.gate_up_proj
  - mlp.experts.down_proj

micro_batch_size: 1
gradient_accumulation_steps: 1
num_epochs: 1
optimizer: adamw_torch
lr_scheduler: constant
learning_rate: 0.0001
bf16: true
tf32: true

gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
activation_offloading: false

# FSDP2: shard the ~168GB NVFP4 model across GPUs (~84GB weights/rank on 2x B200).
# Drop this whole block for single-GPU on a >=180GB card.
fsdp_version: 2
fsdp_config:
  offload_params: false
  state_dict_type: SHARDED_STATE_DICT
  auto_wrap_policy: TRANSFORMER_BASED_WRAP
  transformer_layer_cls_to_wrap: DeepseekV4DecoderLayer
  reshard_after_forward: true

logging_steps: 1
warmup_ratio: 0.1
saves_per_epoch: 1
weight_decay: 0.0
special_tokens:
