## GRPO with a pluggable advantage estimator (issue #3676).
## Run alongside a vLLM server:
##   CUDA_VISIBLE_DEVICES=0 axolotl vllm-serve examples/grpo/advantage_estimator.yaml
##   CUDA_VISIBLE_DEVICES=1 axolotl train examples/grpo/advantage_estimator.yaml

base_model: Qwen/Qwen2.5-1.5B-Instruct
truest_remote_code: true
rl: grpo
chat_template: tokenizer_default

vllm:
  host: 0.0.0.0
  port: 8000
  gpu_memory_utilization: 0.85
  dtype: auto
  max_model_len: 2048

adapter: lora
lora_r: 32
lora_alpha: 64
lora_target_linear: true

trl:
  use_vllm: true
  vllm_server_host: 0.0.0.0
  vllm_server_port: 8000
  vllm_server_timeout: 300
  num_generations: 8                # advantage estimators need >= 2
  max_completion_length: 256
  temperature: 0.7
  # The feature under test: grpo (default) | rloo | reinforce_plus_plus
  advantage_estimator: rloo
  reward_funcs:
    - rewards.format_reward

datasets:
  - path: openai/gsm8k
    name: main
    type: rewards.prompt_transform
    split: train[:2%]

skip_prepare_dataset: true
val_set_size: 0.0
sequence_len: 1024
micro_batch_size: 2
gradient_accumulation_steps: 4
max_steps: 50
learning_rate: 5.0e-6
optimizer: adamw_torch_fused
lr_scheduler: cosine
warmup_steps: 5

bf16: true
attn_implementation: flash_attention_2
gradient_checkpointing: true

special_tokens:
  pad_token: "<|endoftext|>"

# Weights & Biases
use_wandb: true
wandb_project: axolotl-grpo-advantage-estimator
wandb_entity: null                  # set to your team, or leave null for default
wandb_name: grpo-rloo
wandb_watch: gradients

output_dir: ./outputs/grpo-advantage-estimator
logging_steps: 1
save_strategy: "no"
