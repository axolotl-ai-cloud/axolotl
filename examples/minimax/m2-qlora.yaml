# MiniMax MoE (sigmoid-routed) QLoRA example.
#
# This config covers the whole MiniMax M2 family. Every released point
# release (M2.1 / M2.5 / M2.7) and MiniMax M3 ship as `model_type: minimax_m2`
# (architectures: ["MiniMaxM2ForCausalLM"]), so to fine-tune M3 just swap
# `base_model` to the M3 repo once its weights are public — no other changes.
base_model: MiniMaxAI/MiniMax-M2

plugins:
  - axolotl.integrations.cut_cross_entropy.CutCrossEntropyPlugin
  - axolotl.integrations.kernels.KernelsPlugin
use_kernels: true
use_scattermoe: true

chat_template: tokenizer_default
datasets:
  - path: mlabonne/FineTome-100k
    type: chat_template
    split: train[:20%]
    field_messages: conversations
    message_property_mappings:
      role: from
      content: value

val_set_size: 0.0
output_dir: ./outputs/minimax-m2-qlora
dataset_prepared_path: last_run_prepared

sequence_len: 2048
sample_packing: true

load_in_4bit: true
quantize_moe_experts: true
adapter: qlora
lora_r: 16
lora_alpha: 32
lora_dropout: 0
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj

# Routed experts are 3D nn.Parameter tensors (not nn.Linear), so target them
# via lora_target_parameters rather than lora_target_modules:
lora_target_parameters:
  - mlp.experts.gate_up_proj
  - mlp.experts.down_proj

lora_qkv_kernel: false
lora_o_kernel: false
lora_mlp_kernel: false

gradient_accumulation_steps: 2
micro_batch_size: 4
num_epochs: 1
optimizer: adamw_torch_8bit
lr_scheduler: cosine
learning_rate: 0.0002

bf16: auto
tf32: true

gradient_checkpointing: true
resume_from_checkpoint:
logging_steps: 1
attn_implementation: flash_attention_2

warmup_ratio: 0.1
saves_per_epoch: 1
weight_decay: 0.0
special_tokens:
