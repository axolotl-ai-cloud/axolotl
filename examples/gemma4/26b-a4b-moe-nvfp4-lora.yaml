# Gemma-4-26B-A4B MoE LoRA on an NVFP4 (modelopt) checkpoint via ScatterMoE. Single GPU (sm120).
base_model: nvidia/Gemma-4-26B-A4B-NVFP4

plugins:
  - axolotl.integrations.cut_cross_entropy.CutCrossEntropyPlugin
  - axolotl.integrations.kernels.KernelsPlugin
  - axolotl.integrations.liger.LigerPlugin
use_kernels: true
use_scattermoe: true
experts_implementation: scattermoe
dsv4_fp4_grouped_mode: nvfp4
liger_layer_norm: true
liger_rope: true
liger_rms_norm: true
liger_glu_activation: true
liger_rms_norm_gated: true
strict: false

ddp_find_unused_parameters: true

chat_template: gemma4
eot_tokens:
  - "<turn|>"
datasets:
  - path: mlabonne/FineTome-100k
    type: chat_template
    split: train[:10%]
    field_messages: conversations
    message_property_mappings:
      role: from
      content: value
val_set_size: 0.05
output_dir: ./outputs/gemma4-26b-a4b-nvfp4-lora

sequence_len: 4096
sample_packing: true

adapter: lora
lora_r: 16
lora_alpha: 32
lora_dropout: 0
# text backbone only (skip vision/audio encoders)
lora_target_modules: 'model.language_model.layers.[\d]+.(_checkpoint_wrapped_module.)?(mlp|self_attn).(up|down|gate|q|k|v|o)_proj'
lora_target_parameters:
  - experts.gate_up_proj
  - experts.down_proj
lora_mlp_kernel: true
lora_qkv_kernel: true
lora_o_kernel: true
fused_attn_kernel: true

gradient_accumulation_steps: 4
micro_batch_size: 1
num_epochs: 1
optimizer: adamw_torch_8bit
lr_scheduler: cosine
learning_rate: 0.0002

bf16: auto
tf32: true

gradient_checkpointing: true

# flex_attention OOMs on sm120 here; the hybrid runs FA2 (sliding) + SDPA (global). Needs attn_implementation=flash_attention_2.
attn_implementation: flash_attention_2
gemma4_hybrid_attn_impl: true

warmup_ratio: 0.1
evals_per_epoch: 4
saves_per_epoch: 1
weight_decay: 0.0
special_tokens:
