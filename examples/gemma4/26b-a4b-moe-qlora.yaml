base_model: google/gemma-4-26B-A4B

plugins:
  - axolotl.integrations.cut_cross_entropy.CutCrossEntropyPlugin
  - axolotl.integrations.kernels.KernelsPlugin
  - axolotl.integrations.liger.LigerPlugin
use_kernels: true
use_scattermoe: true
experts_implementation: scattermoe
torch_compile: true
liger_layer_norm: true
liger_rope: true
liger_rms_norm: true
liger_glu_activation: true
liger_rms_norm_gated: true
strict: false

# Multi-GPU (DDP) only: LoRA targets the text backbone, so the frozen vision/
# audio encoders and Gemma4's KV-sharing layers leave some adapter params
# without gradients. Required to avoid "parameters that were not used in
# producing loss". No effect on single-GPU runs.
ddp_find_unused_parameters: true

chat_template: gemma4
datasets:
  - path: mlabonne/FineTome-100k
    type: chat_template
    split: train[:10%]
    field_messages: conversations
    message_property_mappings:
      role: from
      content: value
val_set_size: 0.05
output_dir: ./outputs/gemma4-26b-a4b-qlora

sequence_len: 2048
sample_packing: true

load_in_4bit: true
quantize_moe_experts: true
adapter: qlora
lora_r: 16
lora_alpha: 32
lora_dropout: 0

# Restrict LoRA to text backbone only (skip vision/audio encoders)
# using regex to match only the text decoder attention projections.
lora_target_modules: 'model.language_model.layers.[\d]+.(_checkpoint_wrapped_module.)?(mlp|self_attn).(up|down|gate|q|k|v|o)_proj'

# MoE expert LoRA (3D Parameter tensors, not nn.Linear)
lora_target_parameters:
  - experts.gate_up_proj
  - experts.down_proj

# Fused LoRA kernels for the NON-expert path: the dense shared MLP (Gemma4TextMLP) and the
# attention q/k/v/o projections. The routed experts are handled by scattermoe; these fuse the
# remaining per-layer LoRA. fused_attn_kernel lets qkv/o attach on the gemma4_unified variant too.
lora_mlp_kernel: true
lora_qkv_kernel: true
lora_o_kernel: true
fused_attn_kernel: true

bnb_config_kwargs:
  bnb_4bit_use_double_quant: true

wandb_project:
wandb_entity:
wandb_watch:
wandb_name:
wandb_log_model:

gradient_accumulation_steps: 4
micro_batch_size: 1
num_epochs: 1
optimizer: adamw_torch_8bit
lr_scheduler: cosine
learning_rate: 0.0002

bf16: auto
tf32: true

gradient_checkpointing: true
activation_offloading: true
logging_steps: 1

# Hybrid attention is the biggest throughput lever (~2x vs plain sdpa, which computes full attention
# over the packed 4k sequence): FA2 (via the `kernels` lib, no source build) on the sliding-window
# layers + SDPA on the global layers. flex_attention OOMs sm120 shared memory here.
attn_implementation: flash_attention_2
gemma4_hybrid_attn_impl: true

# bnb-4bit MoE experts have no fused 4-bit-read kernel, so they're dequantized to bf16 by the
# default 1-launch parallel_linear path (the dequant'd bf16 is recomputed in backward, not saved,
# so it stays low-memory). For large-expert MoEs / tiny GPUs, set moe_bnb_fast: false to fall back
# to the chunked path and bound the per-pass dequant transient with moe_dequant_chunk_size (32).
# moe_bnb_fast: false
# moe_dequant_chunk_size: 32

warmup_ratio: 0.1
evals_per_epoch: 4
saves_per_epoch: 1
weight_decay: 0.0
special_tokens:
