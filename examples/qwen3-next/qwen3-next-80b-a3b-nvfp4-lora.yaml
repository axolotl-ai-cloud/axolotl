# Qwen3-Next-80B-A3B MoE LoRA on an NVFP4 (modelopt) checkpoint via SonicMoE.
# The Gated DeltaNet layers need flash-linear-attention installed; with sample_packing, micro_batch_size must be 1.
base_model: nvidia/Qwen3-Next-80B-A3B-Instruct-NVFP4

plugins:
  - axolotl.integrations.kernels.KernelsPlugin
use_sonicmoe: true
strict: false

chat_template: tokenizer_default
datasets:
  - path: mlabonne/FineTome-100k
    type: chat_template
    split: train[:2%]
    field_messages: conversations
    message_property_mappings:
      role: from
      content: value
dataset_prepared_path: last_run_prepared
val_set_size: 0
output_dir: ./outputs/qwen3-next-80b-nvfp4-lora

sequence_len: 2048
sample_packing: true
attn_implementation: flash_attention_2

adapter: lora
lora_r: 16
lora_alpha: 32
lora_dropout: 0
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
lora_target_parameters:
  - experts.gate_up_proj
  - experts.down_proj

micro_batch_size: 1
gradient_accumulation_steps: 1
num_epochs: 1
optimizer: adamw_torch_fused
lr_scheduler: cosine
learning_rate: 0.0002
warmup_ratio: 0.1

bf16: auto
tf32: true
gradient_checkpointing: true

logging_steps: 1
saves_per_epoch: 1

wandb_project:
wandb_entity:
wandb_name:
