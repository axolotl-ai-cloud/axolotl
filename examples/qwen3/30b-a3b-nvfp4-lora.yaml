# Qwen3-30B-A3B MoE LoRA on an NVFP4 (modelopt) checkpoint, single B200.
#
# Loading: the checkpoint is quant_method=modelopt / quant_algo=NVFP4, which transformers does not
# recognize (it builds a bf16 skeleton). The kernels plugin's Qwen3MoeAdapter registers
# WeightConverters that fuse the 128 per-expert NVFP4 tensors of each layer into 3D NVFP4Tensor
# params; non-routed NVFP4 linears are dequantized to bf16.
#
# Training: routed-expert LoRA runs through the sonicmoe grouped NVFP4 path. On SM100 (B200) the
# default fp4_cute backend runs the expert GEMMs in-kernel at W4A4 and needs quack:
#   pip install "quack-kernels @ git+https://github.com/Dao-AILab/quack.git"
# AXOLOTL_SONICMOE_NVFP4_BACKEND=dequant selects the Triton W4A16 reference path instead.
#
# Validated on 1x B200: ~30 GiB peak at sequence_len 2048 (~58 GiB at 16k tokens/step).
# After training, `axolotl merge-lora` re-quantizes the merged expert weights back onto the base
# checkpoint's NVFP4 grid, so the output stays a modelopt NVFP4 checkpoint.
base_model: nvidia/Qwen3-30B-A3B-NVFP4

plugins:
  - axolotl.integrations.kernels.KernelsPlugin
use_sonicmoe: true
strict: false

chat_template: tokenizer_default
datasets:
  - path: mlabonne/FineTome-100k
    type: chat_template
    split: train[:2%]
    field_messages: conversations
    message_property_mappings:
      role: from
      content: value
dataset_prepared_path: last_run_prepared
val_set_size: 0
output_dir: ./outputs/qwen3-30b-a3b-nvfp4-lora

sequence_len: 2048
sample_packing: true
attn_implementation: flash_attention_2

adapter: lora
lora_r: 16
lora_alpha: 32
lora_dropout: 0
# Attention projections are plain bf16 nn.Linear after load (non-routed NVFP4 is dequantized).
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
# Routed-expert LoRA on the 3D fused NVFP4 params (PEFT ParamWrapper).
lora_target_parameters:
  - experts.gate_up_proj
  - experts.down_proj

micro_batch_size: 1
gradient_accumulation_steps: 1
num_epochs: 1
optimizer: adamw_torch_fused
lr_scheduler: cosine
learning_rate: 0.0002
warmup_ratio: 0.1

bf16: auto
tf32: true
gradient_checkpointing: true

logging_steps: 1
saves_per_epoch: 1

wandb_project:
wandb_entity:
wandb_name:
