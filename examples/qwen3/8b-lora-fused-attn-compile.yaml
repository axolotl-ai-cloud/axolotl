base_model: Qwen/Qwen3-8B

load_in_8bit: false
load_in_4bit: false
strict: false

datasets:
  - path: tatsu-lab/alpaca
    type: alpaca
dataset_prepared_path:
val_set_size: 0.05
output_dir: ./outputs/qwen3-8b-lora-fused-compile

sequence_len: 4096
sample_packing: true
eval_sample_packing: true

adapter: lora
lora_r: 32
lora_alpha: 64
lora_dropout: 0.0
lora_target_linear: true

fused_attn_kernel: true

torch_compile: true
torch_compile_mode: max-autotune
# Optional inductor tuning; payoff is arch-specific (see docs/optimizations.qmd).
# Uncomment on sm_120 (Blackwell) + >=32 GB only — regresses on sm_86:
# torch_compile_options:
#   max_autotune_gemm: true

gradient_accumulation_steps: 4
micro_batch_size: 1
num_epochs: 1
optimizer: adamw_torch_fused
lr_scheduler: cosine
learning_rate: 0.0002

bf16: auto
tf32: false

gradient_checkpointing: true
attn_implementation: flash_attention_2

warmup_ratio: 0.1
saves_per_epoch: 1
weight_decay: 0.0
