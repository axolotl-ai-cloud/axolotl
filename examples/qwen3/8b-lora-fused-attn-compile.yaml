base_model: Qwen/Qwen3-8B

load_in_8bit: false
load_in_4bit: false
strict: false

datasets:
  - path: tatsu-lab/alpaca
    type: alpaca
dataset_prepared_path:
val_set_size: 0.05
output_dir: ./outputs/qwen3-8b-lora-fused-compile

sequence_len: 4096
sample_packing: true
eval_sample_packing: true

adapter: lora
lora_r: 32
lora_alpha: 64
lora_dropout: 0.0
lora_target_linear: true

fused_attn_kernel: true

torch_compile: true
torch_compile_mode: max-autotune
# torch_compile_options exposes opt-in torch._inductor.config flags; payoff is arch-specific
# (see docs/optimizations.qmd). Plain torch_compile above is the portable win — on sm_86 no flag
# beats it. On sm_120 (Blackwell) + >=32 GB, max_autotune_gemm is the one measured gain; uncomment there:
# torch_compile_options:
#   max_autotune_gemm: true              # ~-2.6% over plain compile on sm_120 + >=32 GB; REGRESSES ~+13% on sm_86
#   # coordinate_descent_tuning: true    # within seed noise on every card tested (also coordinate_descent_check_all_directions)
#   # triton.cudagraphs: true            # needs static shapes; INCOMPATIBLE with sample_packing above
#   # shape_padding / epilogue_fusion    # torch 2.11 defaults (no-op); fx_graph_cache / assume_aligned_inputs / comprehensive_padding / decompose_mem_bound_mm all wash

gradient_accumulation_steps: 4
micro_batch_size: 1
num_epochs: 1
optimizer: adamw_torch_fused
lr_scheduler: cosine
learning_rate: 0.0002

bf16: auto
tf32: false

gradient_checkpointing: true
flash_attention: true

warmup_ratio: 0.1
saves_per_epoch: 1
weight_decay: 0.0
