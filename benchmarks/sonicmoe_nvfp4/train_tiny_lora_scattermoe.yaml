# Incumbent comparison: same run as train_tiny_lora.yaml but through the scattermoe
# grouped NVFP4 path with the in-repo Marlin W4A16 kernel (deep_gemm is not installed
# on the bench pod, so auto-selection cannot be trusted there; marlin is forced).
base_model: nvidia/Qwen3-30B-A3B-NVFP4

plugins:
  - axolotl.integrations.kernels.KernelsPlugin
use_scattermoe: true
dsv4_fp4_grouped_mode: nvfp4
moe_grouped_backend: marlin
strict: false

chat_template: tokenizer_default
datasets:
  - path: mlabonne/FineTome-100k
    type: chat_template
    split: train[:2%]
    field_messages: conversations
    message_property_mappings:
      role: from
      content: value
val_set_size: 0
output_dir: ./outputs/qwen3-30b-nvfp4-scattermoe-lora

sequence_len: 2048
sample_packing: true

adapter: lora
lora_r: 16
lora_alpha: 32
lora_dropout: 0
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
lora_target_parameters:
  - experts.gate_up_proj
  - experts.down_proj

micro_batch_size: 1
gradient_accumulation_steps: 1
max_steps: 30
optimizer: adamw_torch_fused
lr_scheduler: cosine
learning_rate: 0.0002
warmup_steps: 5

bf16: auto
tf32: true
gradient_checkpointing: true

logging_steps: 1
saves_per_epoch: 1

wandb_project: sonic_nvfp4
wandb_name: tiny_lora_qwen3-30b_scattermoe_marlin
